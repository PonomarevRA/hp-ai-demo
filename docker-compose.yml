services:
  historic-portfolio-ai:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 8080
    expose:
      - "8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
